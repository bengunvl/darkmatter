name: DarkMatter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run smoke tests
        run: node test/smoke.test.js

      - name: Check server.js syntax
        run: node --check src/server.js

      - name: Check no duplicate routes
        run: |
          COUNT=$(grep -c "app.get('/dashboard/commits'" src/server.js || true)
          if [ "$COUNT" -gt 1 ]; then
            echo "ERROR: Duplicate /dashboard/commits route ($COUNT found)"
            exit 1
          fi
          echo "Route check passed (count: $COUNT)"
