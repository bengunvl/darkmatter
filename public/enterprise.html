<style>/* ── NAV + FOOTER (canonical) ── */
.dm-nav{
  position:sticky;top:0;z-index:300;
  height:60px;background:#fff;border-bottom:1px solid #e5e7eb;
  display:flex;align-items:center;padding:0 40px;
}
.dm-nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;z-index:1;}
.dm-nav-name{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:17px;font-weight:700;color:#111827;letter-spacing:-0.03em;
}
.dm-nav-links{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:4px;list-style:none;
}
.dm-nav-links a{
  font-size:13.5px;color:#6b7280;padding:5px 10px;border-radius:6px;
  text-decoration:none;transition:color .12s,background .12s;white-space:nowrap;
}
.dm-nav-links a:hover{color:#111827;background:#f3f4f6;}
.dm-nav-links a.active{color:#111827;font-weight:500;}
.dm-nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;z-index:1;}
.dm-nav-icon{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:7px;color:#6b7280;
  text-decoration:none;transition:color .12s,background .12s;
}
.dm-nav-icon:hover{color:#111827;background:#f3f4f6;}
.dm-nav-icon svg{width:18px;height:18px;stroke-width:1.6;}
.dm-nav-cta{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:12.5px;font-weight:700;background:#111827;color:#fff;
  padding:8px 18px;border-radius:7px;text-decoration:none;transition:opacity .15s;
}
.dm-nav-cta:hover{opacity:.85;}
@media(max-width:768px){
  .dm-nav{padding:0 16px;}
  .dm-nav-links{display:none;}
}
.dm-footer{
  border-top:1px solid #e5e7eb;padding:28px 40px;
  display:flex;align-items:center;flex-wrap:wrap;gap:16px;
}
.dm-footer-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.dm-footer-name{
  font-family:'IBM Plex Mono','Courier New',monospace;
  font-size:14px;font-weight:700;color:#111827;letter-spacing:-0.02em;
}
.dm-footer-links{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-left:auto;}
.dm-footer-links a{font-size:12.5px;color:#9ca3af;text-decoration:none;padding:3px 8px;transition:color .12s;}
.dm-footer-links a:hover{color:#374151;}
.dm-footer-copy{font-size:12px;color:#d1d5db;padding:3px 8px;}
@media(max-width:768px){.dm-footer{padding:20px 16px;}.dm-footer-links{margin-left:0;}}

  :root{--bg:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f5;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--text2:#4b5563;--text3:#9ca3af;--violet:#7C3AED;--blue:#2563EB;--cyan:#22D3EE;--green:#10B981;--amber:#F59E0B;--gradient:linear-gradient(90deg,#7C3AED 0%,#2563EB 55%,#22D3EE 100%);--display:'Space Grotesk',sans-serif;--sans:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;}
  footer{border-top:1px solid var(--border);padding:2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:var(--bg);}
  .footer-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
  .footer-logo-mark{width:22px;height:22px;}
  .footer-logo-name{font-family:var(--display);font-weight:700;font-size:0.88rem;color:var(--text);}
  .footer-links{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;}
  .footer-link{font-size:0.75rem;color:var(--text3);text-decoration:none;transition:color 0.15s;}
  .footer-link:hover{color:var(--violet);}
  @media(max-width:640px){.footer-links{gap:1rem;}footer{padding:1.5rem 1rem;}}
  
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#ffffff;color:#111827;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .page{max-width:860px;margin:0 auto;padding:4rem 2rem 5rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
  @media(max-width:700px){.page{grid-template-columns:1fr;gap:2rem;}}
  .left-eyebrow{font-family:var(--mono);font-size:0.6rem;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:1rem;}
  .left-title{font-family:var(--display);font-size:1.8rem;font-weight:700;letter-spacing:-0.03em;line-height:1.25;margin-bottom:1rem;}
  .left-sub{font-size:0.88rem;color:var(--text2);line-height:1.75;margin-bottom:2rem;}
  .feature-list{display:flex;flex-direction:column;gap:0.85rem;margin-bottom:2rem;}
  .feature-item{display:flex;gap:0.65rem;align-items:flex-start;}
  .feature-icon{width:28px;height:28px;border-radius:7px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.2);display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;}
  .feature-text{}
  .feature-title{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:0.15rem;}
  .feature-desc{font-size:0.75rem;color:var(--text2);line-height:1.55;}
  .contact-note{font-size:0.75rem;color:var(--text3);line-height:1.6;}
  /* Form */
  .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem;}
  .form-title{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:0.35rem;}
  .form-sub{font-size:0.78rem;color:var(--text2);margin-bottom:1.5rem;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:0.72rem;color:var(--text2);margin-bottom:0.35rem;font-weight:500;}
  .field input,.field textarea,.field select{width:100%;background:#ffffff;border:1px solid var(--border);border-radius:6px;padding:0.55rem 0.75rem;color:var(--text);font-family:var(--sans);font-size:0.82rem;outline:none;transition:border-color 0.15s;}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--violet);}
  .field textarea{resize:vertical;min-height:90px;}
  .field select option{background:var(--bg2);}
  .checkbox-group{display:flex;flex-direction:column;gap:0.5rem;}
  .checkbox-item{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--text2);cursor:pointer;}
  .checkbox-item input[type="checkbox"]{accent-color:var(--violet);width:14px;height:14px;}
  .submit-btn{width:100%;background:var(--gradient);color:#fff;border:none;border-radius:7px;padding:0.75rem 1rem;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:0.5rem;transition:opacity 0.15s;}
  .submit-btn:hover{opacity:0.9;}
  .success{display:none;text-align:center;padding:2rem 0;}
  .success-icon{font-size:2rem;margin-bottom:0.75rem;}
  .success-title{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:0.35rem;}
  .success-sub{font-size:0.82rem;color:var(--text2);}

  @media(max-width:640px){
    .page, section{padding-left:1.25rem;padding-right:1.25rem;}
    h1{font-size:1.5rem!important;}
    h2{font-size:1.1rem!important;}
    .plans{grid-template-columns:1fr!important;}
    .problem-grid,.audience-grid,.downloads,.impl-grid{grid-template-columns:1fr!important;}
    .analogy-grid{grid-template-columns:1fr!important;}
    table{font-size:0.72rem;}
    th,td{padding:0.4rem 0.5rem;}
    pre{padding:0.85rem;overflow-x:auto;}
    .layout{grid-template-columns:1fr!important;}
    .page{grid-template-columns:1fr!important;}
  }
  :root{

    --display:'Space Grotesk',sans-serif;
    --sans:'Inter',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#ffffff;color:#111827;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .site-nav{
    display:flex;align-items:center;gap:1.5rem;
    padding:0.85rem 2rem;
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;

  .nav-logo-mark{width:28px;height:28px;}
  .nav-logo-name{font-family:var(--display);font-weight:700;font-size:1rem;color:var(--text);letter-spacing:-0.02em;}
  .matter-grad{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .nav-link{font-size:0.78rem;color:var(--text2);text-decoration:none;transition:color 0.15s;white-space:nowrap;}
  .nav-link:hover{color:var(--violet);}
  .nav-icon{
    display:flex;align-items:center;color:var(--text2);text-decoration:none;

    transition:all 0.15s;
  }
  .nav-icon:hover{border-color:var(--text2);color:var(--text);}
  .site-footer{
    border-top:1px solid var(--border);
    padding:2.5rem;
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:1rem;
    background:var(--bg2);
    margin-top:4rem;
  }
  .footer-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
  .footer-logo-mark{width:22px;height:22px;}
  .footer-copy{font-size:0.75rem;color:var(--text3);}
  .footer-links{display:flex;gap:1.5rem;flex-wrap:wrap;}
  .footer-links a{font-size:0.75rem;color:var(--text3);text-decoration:none;transition:color 0.15s;}
  .footer-links a:hover{color:var(--violet);}
  @media(max-width:640px){
    .site-nav{padding:0.75rem 1rem;gap:0.75rem;flex-wrap:wrap;}
    .nav-link{font-size:0.72rem;}
    .site-footer{padding:1.5rem;flex-direction:column;}
    .footer-links{gap:1rem;}
  }
